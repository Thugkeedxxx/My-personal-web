<style>

body{

/* HEADER */

.header{
margin-top:40px;
}

.header h1{
font-size:50px;

.music-grid{

.track{
width:320px;

border-radius:12px;
box-shadow:0 0 20px #00c3ff;

}

.track h3{
color:#00c3ff;
}

.track iframe{
margin-top:10px;
border-radius:10px;
}

/* DOWNLOAD BUTTON */

.download{
display:inline-block;
margin-top:15px;
padding:10px 15px;
border:1px solid #00c3ff;
border-radius:8px;
color:white;
text-decoration:none;
transition:0.3s;
}

.download:hover{
background:#00c3ff;
box-shadow:0 0 20px #00c3ff;
}

/* BACK */

.back{
margin-top:40px;
}

.back a{
color:#00c3ff;
text-decoration:none;
}

</style>

</head>

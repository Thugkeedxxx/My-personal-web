<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>THUGKEED AI</title>

<style>

body{
margin:0;
background:#020617;
font-family:Arial;
color:white;
text-align:center;
}

/* HEADER */

.header{
margin-top:40px;
}

.header h1{
font-size:50px;
color:#00c3ff;
text-shadow:0 0 20px #00c3ff;
}

.header p{
color:#8adfff;
}

/* CHAT BOX */

.chatbox{
width:90%;
max-width:500px;
margin:40px auto;
background:black;
border:1px solid #00c3ff;
border-radius:10px;
box-shadow:0 0 25px #00c3ff;
overflow:hidden;
}

/* CHAT HEADER */

.chat-header{
background:#00c3ff;
color:black;
padding:12px;
font-weight:bold;
}

/* CHAT BODY */

.chat-body{
height:350px;
overflow-y:auto;
padding:15px;
text-align:left;
font-family:monospace;
}

/* INPUT AREA */

.chat-input{
display:flex;
border-top:1px solid #00c3ff;
}

.chat-input input{
flex:1;
padding:12px;
border:none;
outline:none;
background:#020617;
color:white;
}

.chat-input button{
background:#00c3ff;
border:none;
padding:12px;
cursor:pointer;
font-weight:bold;
}

/* VOICE BUTTON */

.voice{
width:100%;
border:none;
background:#00c3ff;
padding:10px;
cursor:pointer;
}

/* BACK BUTTON */

.back{
margin-top:20px;
}

.back a{
color:#00c3ff;
text-decoration:none;
}

</style>

</head>

<body>

<div class="header">

<h1>THUGKEED AI</h1>

<p>Your futuristic AI assistant</p>

</div>

<div class="chatbox">

<div class="chat-header">

THUGKEED AI ONLINE

</div>

<div class="chat-body" id="chatBody">

Hello 👋  
Ask me anything about **THUGKEED TECH**

</div>

<div class="chat-input">

<input id="userInput" placeholder="Ask something...">

<button onclick="send()">Send</button>

</div>

<button class="voice" onclick="voice()">

🎤 Voice AI

</button>

</div>

<div class="back">

<a href="index.html">⬅ Back to Portfolio</a>

</div>

<script>

/* SEND MESSAGE */

async function send(){

let input=document.getElementById("userInput")

let chat=document.getElementById("chatBody")

let msg=input.value

if(msg==="") return

chat.innerHTML+="<br><b>You:</b> "+msg

input.value=""

chat.innerHTML+="<br><b>AI:</b> Thinking..."

chat.scrollTop=chat.scrollHeight

try{

let res=await fetch("/api/ai",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:msg
})

})

let data=await res.json()

chat.innerHTML=chat.innerHTML.replace("Thinking...",data.reply)

}catch{

chat.innerHTML+="<br><b>AI:</b> Server not connected."

}

chat.scrollTop=chat.scrollHeight

}

/* ENTER KEY */

document.getElementById("userInput").addEventListener("keypress",function(e){

if(e.key==="Enter"){

send()

}

})

/* VOICE INPUT */

function voice(){

const speech=new webkitSpeechRecognition()

speech.lang="en-US"

speech.onresult=function(e){

let text=e.results[0][0].transcript

document.getElementById("userInput").value=text

send()

}

speech.start()

}

</script>

</body>

</html>
